apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-dashboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes/dashboard.git
    path: charts/kubernetes-dashboard
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-dashboard
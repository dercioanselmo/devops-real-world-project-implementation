# Annotations Reference: https://kubernetes-sigs.github.io/aws-load-balancer-controller/latest/guide/ingress/annotations/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retail-store-https-ip-mode
  annotations:
    # Load Balancer Name
    alb.ingress.kubernetes.io/load-balancer-name: retail-store-https-ip-mode
    # Ingress Core Settings
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Health Check Settings
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP 
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness    
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
    ## SSL Settings
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
    # First Generate SSL Certificate via AWS Certificate Manager (ACM) for 
    # "retailstore2.<YOURDOMAIN>.com" and update the ARN below before deploying this Ingress Service
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-central-1:652978908369:certificate/ac995844-5b24-4918-b0ae-7405c25d85fc
    # SSL Redirect Setting
    alb.ingress.kubernetes.io/ssl-redirect: '443'       
    # External DNS Annotation
    external-dns.alpha.kubernetes.io/hostname: retailstore2.dercioanselmo.com
spec:
  ingressClassName: alb 
  defaultBackend:
    service:
      name: ui
      port:
        number: 80                  
      
